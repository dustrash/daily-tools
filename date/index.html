<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>날짜 계산기 | Daily Tools</title>

<meta name="description"
content="두 날짜 사이의 기간과 특정 날짜 계산을 할 수 있는 무료 날짜 계산기">

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>📅 날짜 계산기</h1>

<p>
날짜 차이를 계산하세요
</p>

</header>



<div class="box">


<h2>날짜 사이 계산</h2>


<input 
type="date" 
id="date1"
min="1900-01-01"
max="2100-12-31">


<input 
type="date" 
id="date2"
min="1900-01-01"
max="2100-12-31">


<button id="calculate">
계산하기
</button>


<h2 id="result">
결과
</h2>



<hr>



<h2>
날짜 더하기 / 빼기
</h2>


<input type="date" id="baseDate">


<input 
type="number"
id="days"
placeholder="일수">


<div>

<button id="add">
더하기
</button>


<button id="subtract">
빼기
</button>

</div>



<h2 id="futureResult">
결과
</h2>



</div>



<script src="script.js"></script>


</body>

</html>
