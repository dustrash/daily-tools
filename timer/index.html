<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>온라인 타이머 | Daily Tools</title>

<meta name="description"
content="무료 온라인 타이머. 원하는 시간을 설정하고 카운트다운하세요.">

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>⏱ 타이머</h1>

<p>
시간을 설정하고 시작하세요
</p>

</header>



<div class="box">


<div class="inputs">

<input id="minute"
type="number"
placeholder="분"
min="0">


<input id="second"
type="number"
placeholder="초"
min="0"
max="59">

</div>



<h2 id="display">
00:00
</h2>



<div class="buttons">

<button id="start">
시작
</button>


<button id="pause">
일시정지
</button>


<button id="reset">
초기화
</button>


</div>


</div>



<script src="script.js"></script>


</body>

</html>
